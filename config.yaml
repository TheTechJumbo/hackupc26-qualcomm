project:
  name: hackupc26-qualcomm
  output_dir: models  # all final ONNX + pkl files land here

gpu:
  device: auto   # auto | cpu | 0 | cuda:0
  half: true     # FP16 mixed precision — safe on RTX 3060 12GB

vision_model:
  base_model: yolo11n.pt
  data: data/urban_landcover/building-facade-segmentation-augmention-1/data.yaml
  epochs: 30
  imgsz: 640
  batch: 16       # ~3 GB VRAM with FP16; drop to 8 if OOM
  workers: 4
  project: vision_runs
  name: roadside_model

trash_model:
  base_model: yolo11n.pt
  data: data/TACO/TACO-1/data.yaml
  epochs: 25
  imgsz: 640
  batch: 8        # 59 classes = larger heads; 8 is safe on 12 GB with FP16
  workers: 2      # 3375 images x 59 classes needs less shm pressure than vision
  project: vision_runs
  name: trash_model

sensor_model:
  data: data/vegetation_health/plant_health_data.csv
  # Only atmospheric features — no soil or plant-specific sensors
  raw_features:
    - Light_Intensity
    - Ambient_Temperature
    - Humidity
  # Rolling window: 4 readings × 6h interval = 24h trend window per feature.
  # At inference the device maintains a circular buffer of the last 4 readings;
  # no Plant_ID is needed because the buffer captures the local temporal context.
  rolling_window: 4
  # Final 6-feature vector fed to the model (raw + 24h rolling means).
  features:
    - Light_Intensity
    - Ambient_Temperature
    - Humidity
    - Light_Intensity_24h_mean
    - Ambient_Temperature_24h_mean
    - Humidity_24h_mean
  timestamp_col: Timestamp
  plant_id_col: Plant_ID
  target: Plant_Health_Status
  # Label encoding: Healthy=0, Moderate Stress=1, High Stress=2.
  # Binary target: can_grow=1 when stress_level <= healthy_threshold, else 0.
  healthy_threshold: 1
  test_size: 0.2         # used for plant-aware split (last 20% of plants -> test)
  random_state: 42
  n_estimators: 100
  max_depth: 8
  n_jobs: -1
  output: models/tabular_rf_model.pkl

onnx:
  opset: 12       # Qualcomm NPU / Edge Impulse compatible opset
  simplify: false  # onnxsim crashes (double-free in tcache) with onnxruntime==1.18.0
  output_dir: models
