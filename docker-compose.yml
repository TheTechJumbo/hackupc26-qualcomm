services:
  training:
    build: .
    # GPU passthrough -- requires nvidia-container-toolkit in WSL2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # PyTorch DataLoader workers share tensors via /dev/shm. Docker's default is
    # 64 MB -- far too small for multi-worker image loading at 640px batch size.
    # 2 GB covers both vision (batch=16, workers=4) and trash (batch=8, workers=2).
    shm_size: '2g'
    volumes:
      # Mount data, models, and run outputs so they persist outside the container
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./vision_runs:/app/vision_runs
    # Override the default CMD to choose a specific stage, e.g.:
    #   docker compose run training python Factory.py --skip-vision
    command: python Factory.py